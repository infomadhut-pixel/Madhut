<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>MADHUT | Checkout</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="static/images/mad_hut.jpeg">
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>

    <script>
        function getToken(){
            return localStorage.getItem("userToken") ||
                   sessionStorage.getItem("userToken");
        }

        function redirectToLogin(){
            localStorage.removeItem("userToken");
            sessionStorage.removeItem("userToken");
            window.location.replace("user_login.html");
        }

        if (!getToken()) {
            redirectToLogin();
        }
    </script>

    <style>
        *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:'Segoe UI',sans-serif;
        }

        body{
        background:#f5f7fa;
        }

        .header{
        background:#111;
        color:white;
        padding:18px 40px;
        font-size:20px;
        font-weight:bold;
        text-align:center;
        }

        .wrapper{
        max-width:1200px;
        margin:40px auto;
        padding:0 20px;
        display:grid;
        grid-template-columns:1.2fr 0.8fr;
        gap:40px;
        }

        .section{
        background:white;
        padding:30px;
        border-radius:12px;
        box-shadow:0 8px 25px rgba(0,0,0,0.05);
        }

        .section h2{
        margin-bottom:20px;
        }

        input,select{
        width:100%;
        padding:12px;
        margin-bottom:16px;
        border:1px solid #ddd;
        border-radius:8px;
        }

        button{
        width:100%;
        padding:15px;
        border:none;
        background:#0fa36b;
        color:white;
        border-radius:10px;
        font-size:16px;
        cursor:pointer;
        }

        .product-card{
        display:flex;
        gap:20px;
        margin-bottom:20px;
        align-items:center;
        }

        .product-card img{
        width:120px;
        height:120px;
        object-fit:cover;
        border-radius:10px;
        }

        .summary-row{
        display:flex;
        justify-content:space-between;
        margin-bottom:8px;
        }

        .total{
        font-weight:700;
        font-size:18px;
        margin-top:10px;
        }

        @media(max-width:1000px){
        .wrapper{
        grid-template-columns:1fr;
        }
        }
    </style>
</head>

<body>

<div class="header">MADHUT CHECKOUT</div>

<div class="wrapper">

    <!-- LEFT -->
    <div class="section">
        <h2>Shipping Details</h2>

        <input type="text" id="fullName" placeholder="Full Name">
        <input type="text" id="phone" placeholder="Phone Number">
        <input type="text" id="address" placeholder="Full Address">
        <input type="text" id="city" placeholder="City">
        <input type="text" id="pincode" placeholder="Pincode">

        <select id="paymentMode">
            <option value="COD">Cash On Delivery</option>
            <option value="ONLINE">Online Payment</option>
        </select>

        <button onclick="placeOrder()">Place Order</button>
    </div>

    <!-- RIGHT -->
    <div class="section">

        <h2>Order Summary</h2>

        <div class="product-card">
            <img id="checkoutImage">
            <div>
                <h3 id="checkoutName"></h3>
                <p>Size: <span id="checkoutSize"></span></p>
                <p>Color: <span id="checkoutColor"></span></p>
                <p>Qty: <span id="checkoutQty"></span></p>
            </div>
        </div>

        <hr style="margin:20px 0;">

        <div class="summary-row">
            <span>Subtotal</span>
            <span>₹<span id="subtotal"></span></span>
        </div>

        <div class="summary-row">
            <span>Shipping</span>
            <span id="shippingText"></span>
        </div>

        <div class="summary-row total">
            <span>Total</span>
            <span>₹<span id="checkoutTotal"></span></span>
        </div>

    </div>
</div>

<script>

    const checkoutItem = JSON.parse(sessionStorage.getItem("buyNowProduct"));

    if(!checkoutItem){
    alert("No order found");
    window.location.href="index.html";
    }

    // Render product
    document.getElementById("checkoutImage").src = checkoutItem.image;
    document.getElementById("checkoutName").innerText = checkoutItem.name;
    document.getElementById("checkoutSize").innerText = checkoutItem.size;
    document.getElementById("checkoutColor").innerText = checkoutItem.color;
    document.getElementById("checkoutQty").innerText = checkoutItem.quantity;

    // 💰 PRICE LOGIC
    const subtotal = checkoutItem.price * checkoutItem.quantity;

    let shippingCharge = 0;

    if(checkoutItem.quantity < 3){
    shippingCharge = 99;
    }

    const finalTotal = subtotal + shippingCharge;

    // UI update
    document.getElementById("subtotal").innerText = subtotal;
    document.getElementById("checkoutTotal").innerText = finalTotal;

    document.getElementById("shippingText").innerText =
    shippingCharge === 0 ? "Free" : "₹" + shippingCharge;

    // VALIDATION
    function validateForm(){
    const fullName = document.getElementById("fullName").value.trim();
    const phone = document.getElementById("phone").value.trim();
    const address = document.getElementById("address").value.trim();
    const city = document.getElementById("city").value.trim();
    const pincode = document.getElementById("pincode").value.trim();

    if(!fullName || !phone || !address || !city || !pincode){
    alert("Fill all details");
    return false;
    }

    if(phone.length < 10){
    alert("Invalid phone");
    return false;
    }

    return true;
    }

    // PLACE ORDER
    async function placeOrder(){

    if(!validateForm()) return;

    const token = getToken();

    const orderData = {
    ...checkoutItem,
    full_name: document.getElementById("fullName").value.trim(),
    phone: document.getElementById("phone").value.trim(),
    address: document.getElementById("address").value.trim(),
    city: document.getElementById("city").value.trim(),
    pincode: document.getElementById("pincode").value.trim(),
    payment_mode: document.getElementById("paymentMode").value,

    // ✅ IMPORTANT
    shipping_charge: shippingCharge,
    total_amount: finalTotal
    };

    // COD
    if(orderData.payment_mode === "COD"){
    return sendOrderToBackend(orderData, token);
    }

    // ONLINE PAYMENT
    try{
    const paymentRes = await fetch("https://madhut-2.onrender.com/payment/create-order",{
    method:"POST",
    headers:{
    "Content-Type":"application/json"
    },
    body:JSON.stringify({
    amount: finalTotal
    })
    });

    const paymentData = await paymentRes.json();

    const options = {
    key: paymentData.key,
    amount: paymentData.amount,
    currency: "INR",
    name: "MADHUT",
    order_id: paymentData.order_id,

    handler: async function (response){
    orderData.razorpay_payment_id = response.razorpay_payment_id;
    await sendOrderToBackend(orderData, token);
    }
    };

    const rzp = new Razorpay(options);
    rzp.open();

    }catch(err){
    alert("Payment failed");
    }
    }

    async function sendOrderToBackend(orderData, token){
    try{
    const res = await fetch("https://madhut-2.onrender.com/order/checkout",{
    method:"POST",
    headers:{
    "Content-Type":"application/json",
    "Authorization":"Bearer " + token
    },
    body:JSON.stringify(orderData)
    });

    if(res.ok){
    alert("Order placed 🎉");
    sessionStorage.removeItem("buyNowProduct");
    window.location.href="index.html";
    }else{
    alert("Error placing order");
    }

    }catch(err){
    alert("Server error");
    }
    }

</script>
</body>
</html>
