<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>MadHut | Checkout</title>
    <script>
        function getToken(){
            return localStorage.getItem("userToken") ||
                   sessionStorage.getItem("userToken");
        }

        function redirectToLogin(){
            localStorage.removeItem("userToken");
            sessionStorage.removeItem("userToken");
            window.location.replace("user_login.html");
        }

        if (!getToken()) {
            redirectToLogin();
        }

        function goBack(){
            if(document.referrer){
                window.history.back();
            }else{
                window.location.href="index.html";
            }
        }
    </script>

    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}
        body{background:#f5f7fa;}

        .header{
        background:#111;
        color:white;
        padding:18px 40px;
        font-size:20px;
        font-weight:bold;
        letter-spacing:1px;
        }

        .wrapper{
        max-width:1200px;
        margin:40px auto;
        padding:0 20px;
        display:grid;
        grid-template-columns:1.2fr 0.8fr;
        gap:40px;
        }

        .section{
        background:white;
        padding:30px;
        border-radius:12px;
        box-shadow:0 8px 25px rgba(0,0,0,0.05);
        }

        .section h2{
        margin-bottom:20px;
        font-size:22px;
        font-weight:700;
        }

        input,select{
        width:100%;
        padding:12px;
        margin-bottom:16px;
        border:1px solid #ddd;
        border-radius:8px;
        font-size:14px;
        }

        input:focus,select:focus{
        outline:none;
        border-color:#0fa36b;
        }

        button{
        width:100%;
        padding:15px;
        border:none;
        background:#0fa36b;
        color:white;
        font-weight:600;
        border-radius:10px;
        font-size:16px;
        cursor:pointer;
        transition:0.2s;
        }

        button:hover{
        background:#0c8f5e;
        }

        .product-card{
        display:flex;
        gap:20px;
        margin-bottom:20px;
        }

        .product-card img{
        width:120px;
        height:120px;
        object-fit:cover;
        border-radius:10px;
        }

        .product-info h3{
        font-size:18px;
        margin-bottom:8px;
        }

        .summary-row{
        display:flex;
        justify-content:space-between;
        margin-bottom:8px;
        font-size:14px;
        }

        .total{
        font-weight:700;
        font-size:18px;
        margin-top:10px;
        }

        @media(max-width:900px){
        .wrapper{
        grid-template-columns:1fr;
        }
        }
    </style>
</head>

<body>

<div class="header">MADHUT CHECKOUT</div>

<div class="wrapper">

    <!-- LEFT: SHIPPING -->
    <div class="section">
        <h2>Shipping Details</h2>

        <input type="text" id="fullName" placeholder="Full Name">
        <input type="text" id="phone" placeholder="Phone Number">
        <input type="text" id="address" placeholder="Full Address">
        <input type="text" id="city" placeholder="City">
        <input type="text" id="pincode" placeholder="Pincode">

        <select id="paymentMode">
            <option value="COD">Cash On Delivery</option>
            <option value="ONLINE">Online Payment</option>
        </select>

        <button onclick="placeOrder()">Place Order</button>
    </div>

    <!-- RIGHT: ORDER SUMMARY -->
    <div class="section">

        <h2>Order Summary</h2>

        <div class="product-card">
            <img id="checkoutImage">
            <div class="product-info">
                <h3 id="checkoutName"></h3>
                <p>Size: <span id="checkoutSize"></span></p>
                <p>Color: <span id="checkoutColor"></span></p>
                <p>Qty: <span id="checkoutQty"></span></p>
            </div>
        </div>

        <hr style="margin:20px 0; border:none; border-top:1px solid #eee;">

        <div class="summary-row">
            <span>Subtotal</span>
            <span>₹<span id="subtotal"></span></span>
        </div>

        <div class="summary-row">
            <span>Shipping</span>
            <span>Free</span>
        </div>

        <div class="summary-row total">
            <span>Total</span>
            <span>₹<span id="checkoutTotal"></span></span>
        </div>

    </div>

</div>

<script>

    /* ===== Get Buy Now Data from sessionStorage ===== */

    const checkoutItem = JSON.parse(sessionStorage.getItem("buyNowProduct"));

    if(!checkoutItem){
        alert("No order found");
        window.location.href="index.html";
    }

    /* ===== Render Order Data ===== */

    document.getElementById("checkoutImage").src = checkoutItem.image;
    document.getElementById("checkoutName").innerText = checkoutItem.name;
    document.getElementById("checkoutSize").innerText = checkoutItem.size;
    document.getElementById("checkoutColor").innerText = checkoutItem.color;
    document.getElementById("checkoutQty").innerText = checkoutItem.quantity;

    const total = checkoutItem.quantity * checkoutItem.price;

    document.getElementById("subtotal").innerText = total;
    document.getElementById("checkoutTotal").innerText = total;


    /* ===== Token Helper ===== */

    function getToken(){
        return localStorage.getItem("userToken") ||
               sessionStorage.getItem("userToken");
    }


    /* ===== Form Validation ===== */

    function validateForm(){
        const fullName = document.getElementById("fullName").value.trim();
        const phone = document.getElementById("phone").value.trim();
        const address = document.getElementById("address").value.trim();
        const city = document.getElementById("city").value.trim();
        const pincode = document.getElementById("pincode").value.trim();

        if(!fullName || !phone || !address || !city || !pincode){
            alert("Please fill all shipping details");
            return false;
        }

        if(phone.length < 10){
            alert("Enter valid phone number");
            return false;
        }

        return true;
    }


    /* ===== Place Order ===== */

    async function placeOrder(){

        if(!validateForm()){
            return;
        }

        const token = getToken();

        if(!token){
            alert("Session expired. Please login again.");
            window.location.href = "user_login.html";
            return;
        }

        const orderData = {
            ...checkoutItem,
            full_name: document.getElementById("fullName").value.trim(),
            phone: document.getElementById("phone").value.trim(),
            address: document.getElementById("address").value.trim(),
            city: document.getElementById("city").value.trim(),
            pincode: document.getElementById("pincode").value.trim(),
            payment_mode: document.getElementById("paymentMode").value
        };

        try{
            const res = await fetch("https://madhut-5.onrender.com/order/checkout",{
                method:"POST",
                headers:{
                    "Content-Type":"application/json",
                    "Authorization":"Bearer " + token
                },
                body:JSON.stringify(orderData)
            });

            const data = await res.json();

            if(res.status === 401){
                alert("Session expired. Please login again.");
                localStorage.removeItem("userToken");
                sessionStorage.removeItem("userToken");
                window.location.href = "user_login.html";
                return;
            }

            if(res.ok){

                // 🔥 Clear temporary product
                sessionStorage.removeItem("buyNowProduct");

                alert("Order placed successfully 🎉");
                window.location.href="index.html";
            }else{
                alert(data.message || "Something went wrong");
            }

        }catch(error){
            console.error("Checkout Error:", error);
            alert("Server error. Try again.");
        }
    }

</script>
</body>
</html>
