<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MADHUT - User Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="icon" type="image/x-icon" href="static/images/mad_hut.jpeg">

    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(120deg,#c7e6f2,#d6e8ff,#bff3e3);
        }

        .login-container{
            width:480px;
            padding:50px;
            border-radius:15px;
            background:white;
            box-shadow:0 8px 20px rgba(0,0,0,0.2);
            text-align:center;
        }

        h2{margin-bottom:30px;}

        .input-group{margin-bottom:20px;}

        .input-group input{
            width:100%;
            padding:12px;
            border:none;
            border-bottom:2px solid #333;
            outline:none;
        }

        .btn-login{
            width:100%;
            padding:12px;
            background:#2d5c88;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
        }

        .btn-signup{
            width:100%;
            padding:12px;
            background:#2ecc71;
            color:white;
            border:none;
            border-radius:5px;
            margin-top:10px;
        }

        .msg{margin-bottom:10px;font-size:14px;}
        .error{color:red;}
        .success{color:#2ecc71;}
    </style>
</head>

<body>

<div class="login-container">
    <h2>User Login</h2>

    <div id="msg" class="msg"></div>

    <div class="input-group">
        <input type="email" id="email" placeholder="Email">
    </div>

    <div class="input-group">
        <input type="password" id="password" placeholder="Password">
    </div>

    <label>
        <input type="checkbox" id="remember"> Remember me
    </label>

    <br><br>

    <button class="btn-login" id="loginBtn">LOGIN</button>
    <button class="btn-signup" onclick="goToSignup()">SIGN UP</button>
</div>

<script type="module">

    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAIqeoNVZaz6XXJRT71ODhreTR-WsmVyXY",
        authDomain: "MADHUT-97c1e.firebaseapp.com",
        projectId: "MADHUT-97c1e",
        appId: "1:443781397252:web:64f178cd71d0993cc0ae51"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const API_URL = "http://127.0.0.1:5000/user/login";

    const msgDiv = document.getElementById("msg");

    // ✅ ONLY redirect if Firebase session is stable
    let checked = false;

    onAuthStateChanged(auth, (user) => {

        if (!checked) {
            checked = true;

            // only redirect if user REALLY logged in
            if (user) {
                window.location.href = "index.html";
            }
        }
    });

    async function loginUser(){

        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;
        const remember = document.getElementById("remember").checked;

        msgDiv.innerText = "";
        msgDiv.className = "msg";

        if(!email || !password){
            msgDiv.innerText = "Fill all fields";
            msgDiv.classList.add("error");
            return;
        }

        try{

            // clear any previous session
            await signOut(auth);

            const userCredential = await signInWithEmailAndPassword(auth,email,password);
            const user = userCredential.user;

            const token = await user.getIdToken();

            const response = await fetch(API_URL,{
                method:"POST",
                headers:{
                    "Authorization":"Bearer "+token,
                    "Content-Type":"application/json"
                },
                body:JSON.stringify({ email:user.email })
            });

            const data = await response.json();

            if(data.status === false){

                await signOut(auth);

                msgDiv.innerText = data.message;
                msgDiv.classList.add("error");
                return;
            }

            msgDiv.innerText = "Login successful!";
            msgDiv.classList.add("success");

            if(remember){
                localStorage.setItem("userToken",token);
            }else{
                sessionStorage.setItem("userToken",token);
            }

            setTimeout(()=>{
                window.location.href = "index.html";
            },1000);

        }catch(error){

            msgDiv.classList.add("error");

            switch(error.code){
                case "auth/user-not-found":
                    msgDiv.innerText="User not found";
                    break;
                case "auth/wrong-password":
                    msgDiv.innerText="Wrong password";
                    break;
                default:
                    msgDiv.innerText="Login failed";
            }
        }
    }

    document.getElementById("loginBtn").addEventListener("click",loginUser);

    document.addEventListener("keydown",(e)=>{
        if(e.key==="Enter") loginUser();
    });

    window.goToSignup=function(){
        window.location.href="user_signup.html";
    };

</script>

</body>
</html>
