<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MadHut | Variety</title>
    <link rel="icon" type="image/x-icon" href="static/images/mad_hut.jpeg">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Segoe UI',sans-serif;
        }

        body{
            background:linear-gradient(135deg,#0b0b0b,#121212);
            color:white;
        }

        .header{
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:18px 40px;
            background:#000;
        }

        .logo{
            color:#f1c40f;
            font-size:22px;
            font-weight:700;
            text-decoration:none;
        }

        .title{
            text-align:center;
            margin:40px 0;
            font-size:26px;
        }

        .grid{
            display:grid;
            grid-template-columns:repeat(2,1fr);
            gap:25px;
            max-width:900px;
            margin:auto;
            padding:20px;
        }

        .card{
            position:relative;
            height:280px;
            border-radius:18px;
            overflow:hidden;
            cursor:pointer;
            background:#111;
            transition:0.3s;
        }

        .card:hover{
            transform:scale(1.05);
        }

        .card img{
            width:100%;
            height:100%;
            object-fit:cover;
        }

        .overlay{
            position:absolute;
            bottom:0;
            width:100%;
            height:60%;
            background:linear-gradient(to top,rgba(0,0,0,0.9),transparent);
        }

        .card-text{
            position:absolute;
            bottom:20px;
            left:20px;
            font-size:20px;
            font-weight:600;
        }

        .loading{
            position:fixed;
            inset:0;
            background:rgba(0,0,0,0.8);
            display:flex;
            justify-content:center;
            align-items:center;
            font-size:20px;
            display:none;
        }

        /* ✅ Coming Soon UI */
        .coming-soon{
            position:fixed;
            inset:0;
            background:rgba(0,0,0,0.9);
            display:none;
            justify-content:center;
            align-items:center;
            flex-direction:column;
            text-align:center;
            z-index:999;
        }

        .coming-box{
            background:#111;
            padding:40px;
            border-radius:15px;
            box-shadow:0 10px 30px rgba(0,0,0,0.5);
        }

        .coming-box h2{
            color:#f1c40f;
            margin-bottom:10px;
        }

        .coming-box p{
            color:#ccc;
            margin-bottom:20px;
        }

        .coming-box button{
            padding:10px 20px;
            border:none;
            background:#f1c40f;
            color:#000;
            cursor:pointer;
            border-radius:8px;
        }
    </style>

</head>

<body>

<div class="header">
    <a href="index.html" class="logo">MADHUT</a>
</div>

<div class="title">Choose Your Style</div>

<div class="grid">

    <div class="card" data-type="regular">
        <img src="static/images/regular_fit.jpg">
        <div class="overlay"></div>
        <div class="card-text">Regular Fit</div>
    </div>

    <div class="card" data-type="polo">
        <img src="static/images/polo.jpg">
        <div class="overlay"></div>
        <div class="card-text">Polo</div>
    </div>

    <div class="card" data-type="oversize">
        <img src="static/images/over_sized.webp">
        <div class="overlay"></div>
        <div class="card-text">Oversize</div>
    </div>

    <div class="card" data-type="fullsleeve">
        <img src="static/images/full_sleeve.webp">
        <div class="overlay"></div>
        <div class="card-text">Full Sleeve</div>
    </div>

</div>

<div class="loading" id="loading">Loading...</div>


<div class="coming-soon" id="comingSoon">
    <div class="coming-box">
        <h2>Coming Soon</h2>
        <p>This category is not available yet</p>
        <button onclick="closeComing()">OK</button>
    </div>
</div>

<script>
    const BASE_URL = "https://madhut-qeqj.onrender.com";
    const loading = document.getElementById("loading");
    const comingSoon = document.getElementById("comingSoon");

    function showComing(){
        comingSoon.style.display = "flex";
    }

    function closeComing(){
        comingSoon.style.display = "none";
    }

    document.querySelectorAll(".card").forEach(card => {

        card.addEventListener("click", async () => {

            const type = card.getAttribute("data-type");

            try{
                loading.style.display = "flex";

                const res = await fetch(`${BASE_URL}/tshirt/variety?type=${type}`);

                if(!res.ok) throw new Error("API error");

                const data = await res.json();

                if(!data || data.length === 0){
                    showComing();
                    return;
                }

                sessionStorage.setItem("products", JSON.stringify(data));

                window.location.href = `variety_product_details.html?type=${type}`;

            }catch(err){
                alert("API error");
                console.error(err);
            }finally{
                loading.style.display = "none";
            }

        });

    });
</script>

</body>
</html>
