<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MadHut | Premium T-Shirts</title>

    <link rel="icon" type="image/x-icon" href="static/images/mad_hut.jpeg">

    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}
        html{scroll-behavior:smooth;}
        body{background:#f4f6f9;display:flex;flex-direction:column;min-height:100vh;}
        .main-content{flex:1;}

        .header{
            display:flex;justify-content:space-between;align-items:center;
            padding:18px 60px;background:#111;color:white;

            position:fixed;
            top:0;
            left:0;
            width:100%;
            z-index:1000;
        }

        .header nav a{
            color:white;text-decoration:none;margin-left:25px;
            font-size:14px;transition:0.3s;
        }
        .header nav a:hover{color:#0fa36b;}

        .header-right{display:flex;align-items:center;gap:12px;}


        .nav-btn{
            padding:6px 14px;border-radius:20px;font-size:13px;
            cursor:pointer;border:1px solid #444;transition:0.3s;
        }
        .nav-btn:hover{background:#0fa36b;border-color:#0fa36b;}

        .container{
            padding:120px 60px 40px 60px;
        }

        .horizontal-ad{
            width:85%;
            margin:0 auto 30px auto;
            padding:16px;
            border-radius:20px;

            background:linear-gradient(135deg,#0b0b0b,#111,#1c1c1c);
            color:white;
            text-align:center;

            font-size:20px;
            font-weight:700;

            position:relative;
            overflow:hidden;

            box-shadow:0 10px 40px rgba(0,0,0,0.4);
            animation:fadeSlide 1s ease;
        }

        @keyframes fadeSlide{
            from{opacity:0;transform:translateY(-10px);}
            to{opacity:1;transform:translateY(0);}
        }

        .horizontal-ad::after{
            content:"";
            position:absolute;
            top:0;
            left:-100%;
            width:40%;
            height:100%;
            background:linear-gradient(120deg,transparent,rgba(255,255,255,0.3),transparent);
            transform:skewX(-20deg);
            animation:shineMove 3.5s infinite;
        }

        @keyframes shineMove{
            0%{left:-100%;}
            100%{left:200%;}
        }

        .horizontal-ad span{
            display:block;
            margin-top:6px;
            font-size:13px;
            opacity:0.75;
        }

        .highlight{
            color:#d4af37;
        }

        .product-grid{
            display:grid;
            grid-template-columns:repeat(3,1fr);
            gap:20px;
        }

        .card{
            position:relative;
            border-radius:18px;
            overflow:hidden;
            height:260px;
            cursor:pointer;
            background:#fff;
            box-shadow:0 10px 25px rgba(0,0,0,0.1);
            transition:0.3s;

            opacity:0;
            transform:translateY(20px);
            animation:fadeIn 0.5s ease forwards;
        }

        @keyframes fadeIn{
            to{opacity:1;transform:translateY(0);}
        }

        .card:hover{transform:translateY(-6px);}

        .card img{width:100%;height:100%;object-fit:contain;background:#fff;}

        .overlay{
            position:absolute;bottom:0;width:100%;height:100%;
            background:linear-gradient(to top, rgba(0,0,0,0.7), transparent 60%);
        }

        .content{
            position:absolute;bottom:0;padding:14px;color:#fff;
        }

        .loader-spinner{
            width:35px;height:35px;border:4px solid #ddd;
            border-top:4px solid #111;border-radius:50%;
            animation:spin 0.8s linear infinite;margin:20px auto;
        }

        .footer{
            background:#0b0b0b;
            color:white;
            padding:60px 80px 25px;
        }

        /* PERFECT CENTER + NO LEFT GAP */
        .footer-grid{
            max-width:1200px;
            margin:0 auto;   /* 🔥 center everything */
            display:grid;
            grid-template-columns:repeat(4,1fr);
            gap:50px;
        }

        /* HEADINGS */
        .footer-col h3{
            color:#f1c40f;
            margin-bottom:18px;
            font-size:15px;
            letter-spacing:1px;
        }

        .logo{
            color:#f1c40f;
            margin-bottom:18px;
            font-size:20px;
            font-weight:700;
        }

        /* LINKS */
        .footer-link{
            font-size:14px;
            margin-bottom:12px;
            cursor:pointer;
            transition:0.3s;
            color:#ddd;
        }

        .footer-link:hover{
            color:#0fa36b;
            padding-left:5px;
        }

        /* SMALL TEXT */
        .footer-small{
            font-size:13px;
            margin-top:12px;
            opacity:0.7;
        }

        /* SOCIAL */
        .social-row{
            display:flex;
            gap:14px;
            margin-bottom:12px;
        }

        .social{
            width:42px;
            height:42px;
            border-radius:50%;
            display:flex;
            align-items:center;
            justify-content:center;
            background:#1c1c1c;
            text-decoration:none;
            color:white;
            font-size:16px;
            transition:0.3s;
        }
        .social img{
            width:22px;
            height:22px;
            object-fit:contain;
        }

        .youtube:hover{
            background:red;
            box-shadow:0 0 12px red;
            transform:translateY(-4px);
        }

        .facebook:hover{
            background:#1877f2;
            box-shadow:0 0 12px #1877f2;
            transform:translateY(-4px);
        }

        .insta:hover{
            background:linear-gradient(45deg,#feda75,#d62976,#962fbf);
            box-shadow:0 0 12px #d62976;
            transform:translateY(-4px);
        }

        /* SUBSCRIBE */
        .subscribe-box{
            display:flex;
            margin-top:10px;
        }

        .subscribe-box input{
            flex:1;
            padding:12px;
            border:none;
            outline:none;
            background:#1c1c1c;
            color:white;
        }

        .subscribe-box button{
            background:#f1c40f;
            border:none;
            padding:12px 18px;
            cursor:pointer;
            font-weight:bold;
        }

        /* LINE */
        .footer-line{
            margin:40px auto 20px;
            max-width:1200px;
            border:0.5px solid #333;
        }

        /* BOTTOM */
        .footer-bottom{
            text-align:center;
            font-size:13px;
            opacity:0.7;
        }
        @media(max-width:1024px){
            .product-grid{
                grid-template-columns:repeat(3,1fr);
            }
        }

        /* RESPONSIVE */
       @media(max-width:768px){

            .header{
                padding:14px 20px;
            }

            .container{
                padding:110px 12px 30px 15px;
            }

            .horizontal-ad{
                width:100%;
                font-size:15px;
            }
            .product-grid{
                grid-template-columns:repeat(2,1fr); /* tablet */
                gap:12px;
            }
               .card{
                height:260px; /* compact */
            }
       }



        @media(max-width:500px){
            .product-grid{
                grid-template-columns:repeat(2,1fr);
                gap:10px;
            }

            .card{
                height:250px;
            }
        }
        .skeleton{
            border-radius:14px;
            background:linear-gradient(90deg,#eeeeee 25%,#dddddd 37%,#eeeeee 63%);
            background-size:400% 100%;
            animation:shimmer 1.2s infinite;
        }
        @keyframes shimmer{
            0%{background-position:100% 0;}
            100%{background-position:-100% 0;}
        }

        /* ===== END OF PRODUCTS MESSAGE ===== */
        .end-message{
            text-align:center;
            padding:40px 20px;
            animation:fadeIn 0.6s ease forwards;
        }

        .end-message-icon{
            font-size:40px;
            margin-bottom:12px;
        }

        .end-message-title{
            font-size:18px;
            font-weight:700;
            color:#111;
            margin-bottom:6px;
        }

        .end-message-sub{
            font-size:14px;
            color:#888;
        }

        .end-message-line{
            display:flex;
            align-items:center;
            gap:14px;
            max-width:340px;
            margin:20px auto 0;
        }

        .end-message-line::before,
        .end-message-line::after{
            content:"";
            flex:1;
            height:1px;
            background:#ddd;
        }

        .end-message-dot{
            width:8px;
            height:8px;
            border-radius:50%;
            background:#0fa36b;
            display:inline-block;
        }
    </style>
</head>

<body>

<div class="main-content">

    <header class="header">
        <div class="logo">MADHUT</div>

        <nav>
            <a href="customised_as_you_want.html">Customize</a>
            <a href="recent_product.html">New Arrivals</a>
        </nav>

        <div class="header-right">
            <div id="authSection"></div>
        </div>
    </header>

    <section class="container">

        <div class="horizontal-ad">
            FREE SHIPPING on <span class="highlight">3+ Products</span>
            <span>Shop More • Save More • Limited Time Offer</span>
        </div>

        <div id="tshirtContainer" class="product-grid"></div>
    </section>

</div>
<footer class="footer">

    <div class="footer-grid">

        <!-- LEFT -->
        <div class="footer-col">
            <h2 class="logo">MADHUT</h2>
        </div>


        <!-- CONNECT -->
        <div class="footer-col">
            <h3>CONNECT WITH US</h3>

           <div class="social-row">

                <a href="https://youtube.com/@madhutofficial?si=k3KXCca5Ci3ju90t" class="social youtube">
                    <img src="static/images/youtube.png" alt="YouTube">
                </a>

                <a href="https://www.facebook.com/share/1CNJNKQuPC/" class="social facebook">
                    <img src="static/images/facebook.png" alt="Facebook">
                </a>

                <a href="https://www.instagram.com/madhutofficial?igsh=MXhxbGdqc21pejZ5aw==" class="social insta">
                    <img src="static/images/instagram.png" alt="Instagram">
                </a>
          </div>

            <p class="footer-small">Follow us for latest drops 🔥</p>
        </div>

        <!-- SUBSCRIBE -->
        <div class="footer-col">
            <h3>KEEP UP TO DATE</h3>
            <input
                    type="email"
                    id="subscribeEmail"
                    name="email"
                    placeholder="Enter Email Id"
                    autocomplete="email"
            >
        </div>

    </div>

    <hr class="footer-line">

    <p class="footer-bottom">© 2026 MadHut • All Rights Reserved</p>
</footer>

<script type="module">

    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const BASE_URL = "https://madhut-2-62yx.onrender.com";

    const firebaseConfig = {
        apiKey: "AIzaSyAIqeoNVZaz6XXJRT71ODhreTR-WsmVyXY",
        authDomain: "MADHUT-97c1e.firebaseapp.com",
        projectId: "MADHUT-97c1e",
        appId: "1:443781397252:web:64f178cd71d0993cc0ae51"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // ===== ELEMENTS =====
    const container = document.getElementById("tshirtContainer");
    const authSection = document.getElementById("authSection");

    // ===== STATE =====
    let lastId = null;
    let isLoading = false;
    let allLoaded = false;

    // ===== CACHE KEYS =====
    const CACHE_KEY = "tshirts_cache";
    const CURSOR_KEY = "tshirts_cursor";

    // ===== SOCKET =====
    const socket = io(BASE_URL, {
        transports: ["websocket"],
        reconnectionAttempts: 2
    });

    socket.on("new_product", addNewProductToTop);
    socket.on("delete_product", (data) => removeProductFromUI(data._id));

    // ===== AUTH =====
    onAuthStateChanged(auth, (user) => {

        if (user) {
            authSection.innerHTML = `
                <span class="nav-btn" id="profileBtn">Account</span>
                <span class="nav-btn" id="logoutBtn">Logout</span>
            `;

            document.getElementById("profileBtn").onclick = () => {
                window.location.href = "user_dashboard.html";
            };

            document.getElementById("logoutBtn").onclick = async () => {
                await signOut(auth);
                location.reload();
            };


        } else {
            authSection.innerHTML = `
                <span class="nav-btn" id="loginBtn">Login</span>
            `;

            document.getElementById("loginBtn").onclick = () => {
                window.location.href = "user_login.html";
            };
        }
    });


    async function loadTshirts() {

        if (isLoading || allLoaded) return;

        isLoading = true;
        if (!allLoaded) {
            showLoader(true);
        }

        try {
            if (!lastId) {
                const cached = localStorage.getItem(CACHE_KEY);
                const cachedCursor = localStorage.getItem(CURSOR_KEY);

                if (cached) {
                    displayProducts(JSON.parse(cached));
                    lastId = cachedCursor;
                    isLoading = false;
                    showLoader(false);
                    return;
                }
            }

            let url = `${BASE_URL}/user/tshirts?limit=10`;

            if (lastId) {
                url += `&last_id=${lastId}`;
            }

            const res = await fetch(url);
            const data = await res.json();

            if (!data.products || data.products.length === 0) {
                allLoaded = true;
                observer.disconnect();
                showLoader(false);
                showEndMessage();   // ← show message when no products at all
                return;
            }

            displayProducts(data.products);

            if (!lastId) {
                localStorage.setItem(CACHE_KEY, JSON.stringify(data.products));
                localStorage.setItem(CURSOR_KEY, data.next_cursor);
            }

            if (!data.next_cursor) {
                allLoaded = true;
                observer.disconnect();
                showLoader(false);
                showEndMessage();   // ← show message when last page reached
            } else {
                lastId = data.next_cursor;
            }

        } catch (err) {
            console.log(err);
        }

        isLoading = false;
        showLoader(false);
    }

    // ===== DISPLAY =====
    function displayProducts(products) {
        products.forEach(product => {
            if (document.querySelector(`[data-id="${product._id}"]`)) return;

            const card = createCard(product);
            container.appendChild(card);
        });
    }

    // ===== CARD =====
    function createCard(product) {

        const card = document.createElement("div");
        card.className = "card";
        card.dataset.id = product._id;

        card.onclick = () => {
            window.location.href = `product_detail.html?id=${product._id}`;
        };

        // 🔥 smaller image (faster)
        const imageUrl = (product.images?.[0] || "") + "?f_auto,q_auto,w=250";

        // 🔥 short name (important)
        const shortName = product.name.length > 40
            ? product.name.substring(0, 40) + "..."
            : product.name;

        card.innerHTML = `
            <img src="${imageUrl}" loading="lazy">

            <div class="overlay"></div>

            <div class="content">

                <!-- SHORT NAME -->
                <div style="font-size:12px;line-height:1.2;">
                    ${shortName}
                </div>

                <!-- PRICE -->
                <div style="margin-top:4px;">
                    <span style="font-weight:bold;font-size:14px;">
                        ₹${product.price}
                    </span>

                    <!-- SMALL DISCOUNT -->
                    ${product.discount_percent ? `
                    <span style="color:wheat;font-size:15px;margin-left:4px;">
                        ${product.discount_percent}% OFF
                    </span>
                    ` : ""}
                </div>

            </div>
        `;
        return card;
    }

    function addNewProductToTop(product) {

        localStorage.removeItem(CACHE_KEY);

        if (document.querySelector(`[data-id="${product._id}"]`)) return;

        const card = createCard(product);
        container.prepend(card);
    }

    function removeProductFromUI(productId) {
        const card = document.querySelector(`[data-id="${productId}"]`);
        if (card) card.remove();
    }

    // ===== LOADER =====
    function showLoader(show) {

        let loader = document.getElementById("loader");

        if (!loader) {
            loader = document.createElement("div");
            loader.id = "loader";

            loader.innerHTML = `
                <div style="
                    display:grid;
                    grid-template-columns:repeat(4,1fr);
                    gap:18px;
                ">
                    ${Array(4).fill().map(() => `
                        <div class="skeleton" style="height:250px;"></div>
                    `).join("")}
                </div>
            `;

            container.after(loader);
        }

        // Always hide when allLoaded, regardless of show param
        loader.style.display = (show && !allLoaded) ? "block" : "none";
    }

    // ===== END OF PRODUCTS MESSAGE =====
    function showEndMessage() {
        if (document.getElementById("endMessage")) return;

        const msg = document.createElement("div");
        msg.id = "endMessage";
        msg.className = "end-message";

        msg.innerHTML = `
            <div class="end-message-line">
                <span class="end-message-dot"></span>
            </div>
            <div class="end-message-icon" style="margin-top:20px;">🛍️</div>
            <div class="end-message-title">You've seen it all!</div>
            <div class="end-message-sub">You've explored our entire collection. Check back soon for new drops.</div>
        `;

        // Insert after loader (or after container if loader doesn't exist)
        const loader = document.getElementById("loader");
        if (loader) {
            loader.after(msg);
        } else {
            container.after(msg);
        }
    }

    // ===== ERROR =====
    function showError(message) {
        const msg = document.createElement("div");
        msg.style.textAlign = "center";
        msg.style.color = "red";
        msg.style.padding = "20px";
        msg.innerText = message;

        container.after(msg);
    }

    // ===== SCROLL =====
    const trigger = document.createElement("div");
    container.after(trigger);

    const observer = new IntersectionObserver((entries) => {
        if (entries[0].isIntersecting) {
            loadTshirts();
        }
    });

    observer.observe(trigger);


    window.onload = () => {
        loadTshirts();
    };

</script>
</body>
</html>
