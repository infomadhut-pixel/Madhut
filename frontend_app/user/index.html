<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MadHut | Premium T-Shirts</title>

    <link rel="icon" type="image/x-icon" href="static/images/mad_hut.jpeg">

    <meta name="description" content="ShopMadHut - Premium T-Shirts Online">
    <meta name="keywords" content="tshirt, fashion, shopmadhut, clothing">

    <style>

        *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:'Segoe UI',sans-serif;
        }

        body{
        background:#f8f9fa;
        display:flex;
        flex-direction:column;
        min-height:100vh;
        }

        .main-content{
        flex:1;
        }

        /* ================= HEADER ================= */

        .header{
        display:flex;
        justify-content:space-between;
        align-items:center;
        padding:18px 60px;
        background:#111;
        color:white;
        flex-wrap:wrap;
        gap:10px;
        }

        .logo{
        font-size:22px;
        font-weight:bold;
        }

        .header nav{
        display:flex;
        flex-wrap:wrap;
        }

        .header nav a{
        color:white;
        text-decoration:none;
        margin-left:30px;
        font-size:14px;
        }

        .header nav a:hover{
        color:#0fa36b;
        }

        .cart{
        font-size:14px;
        }

        .auth-btn{
        margin-left:20px;
        cursor:pointer;
        }

        .auth-btn:hover{
        color:#0fa36b;
        }

        /* ================= CONTAINER ================= */

        .container{
        display:flex;
        padding:40px 60px;
        gap:40px;
        }

        /* ================= SIDEBAR ================= */

        .sidebar{
        width:250px;
        background:white;
        padding:25px;
        border-radius:12px;
        box-shadow:0 4px 15px rgba(0,0,0,0.05);
        height:fit-content;
        }

        .sidebar h3{
        margin-bottom:15px;
        }

        .sidebar button{
        width:100%;
        padding:10px;
        margin-bottom:10px;
        border:none;
        border-radius:6px;
        background:#111;
        color:white;
        cursor:pointer;
        }

        .sidebar button:hover{
        background:#0fa36b;
        }

        /* ================= PRODUCTS ================= */

        .products{
        flex:1;
        }

        .product-grid{
        display:grid;
        grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
        gap:25px;
        }

        /* ================= CARD ================= */

        .card{
        background:white;
        border-radius:15px;
        padding:15px;
        box-shadow:0 5px 15px rgba(0,0,0,0.05);
        display:flex;
        flex-direction:column;
        }

        .card img{
        width:100%;
        height:280px;
        object-fit:cover;
        border-radius:10px;
        }

        .card h4{
        margin:12px 0 6px;
        font-size:15px;
        }

        .price{
        color:#0fa36b;
        font-weight:bold;
        }

        .old-price{
        text-decoration:line-through;
        color:gray;
        font-size:13px;
        margin-left:8px;
        }

        .discount{
        font-size:12px;
        color:red;
        }

        .add-btn{
        margin-top:auto;
        width:100%;
        padding:10px;
        border:none;
        border-radius:8px;
        background:#111;
        color:white;
        cursor:pointer;
        }

        .add-btn:hover{
        background:#0fa36b;
        }

        /* ================= PAGINATION ================= */

        .pagination{
        text-align:center;
        margin-top:40px;
        }

        .pagination button{
        padding:8px 14px;
        margin:4px;
        border:none;
        background:#ddd;
        border-radius:5px;
        cursor:pointer;
        }

        .pagination button.active{
        background:#111;
        color:white;
        }

        /* ================= FOOTER ================= */

        .footer{
        background:#111;
        color:white;
        padding:40px;
        text-align:center;
        margin-top:auto;
        }

        /* ================= SKELETON ================= */

        .skeleton{
        background:#e0e0e0;
        border-radius:10px;
        animation:pulse 1.5s infinite;
        }

        @keyframes pulse{
        0%{opacity:1;}
        50%{opacity:0.5;}
        100%{opacity:1;}
        }

        .skeleton-card{
        height:380px;
        }

        /* ================= RESPONSIVE ================= */

        /* Tablet */

        @media (max-width:1000px){

        .container{
        padding:30px;
        gap:20px;
        }

        .header{
        padding:15px 30px;
        }

        .sidebar{
        width:200px;
        }

        }

        /* Mobile */

        @media (max-width:768px){

        .header{
        flex-direction:column;
        align-items:flex-start;
        }

        .header nav{
        margin-top:10px;
        }

        .header nav a{
        margin-left:0;
        margin-right:15px;
        }

        .container{
        flex-direction:column;
        padding:20px;
        }

        .sidebar{
        width:100%;
        display:flex;
        flex-wrap:wrap;
        gap:10px;
        }

        .sidebar button{
        flex:1;
        margin:0;
        }

        .product-grid{
        grid-template-columns:repeat(auto-fill,minmax(170px,1fr));
        gap:15px;
        }

        .card img{
        height:200px;
        }

        }

        /* Small phones */

        @media (max-width:480px){

        .product-grid{
        grid-template-columns:1fr 1fr;
        }

        .card img{
        height:180px;
        }

        .header{
        padding:15px;
        }

        .container{
        padding:15px;
        }

        }

    </style>
</head>

<body>

<div class="main-content">

    <header class="header">
        <div class="logo">MADHUT</div>

        <nav>
            <a href="customised_as_you_want.html">Customised</a>
            <a href="#">New Arrivals</a>
            <a href="#">Coffee-Mug</a>
            <a href="#">Winterwear</a>
        </nav>

        <div>
            <span class="cart">🛒 Cart (<span id="cartCount">0</span>)</span>
            <span id="authSection"></span>
        </div>
    </header>

    <section class="container">

        <div class="sidebar">
            <h3>Filter By Price</h3>
            <button onclick="applyFilter(0,500)">Under ₹500</button>
            <button onclick="applyFilter(500,1000)">₹500 - ₹1000</button>
            <button onclick="applyFilter(null,null)">Clear Filter</button>
        </div>

        <div class="products">
            <div id="tshirtContainer" class="product-grid"></div>
            <div id="pagination" class="pagination"></div>
        </div>

    </section>

</div>

<footer class="footer">
    © 2026 MadHut. All rights reserved.
</footer>
<script type="module">

    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    /* 🔥 Firebase Config */
    const firebaseConfig = {
        apiKey: "AIzaSyAIqeoNVZaz6XXJRT71ODhreTR-WsmVyXY",
        authDomain: "madhut-97c1e.firebaseapp.com",
        projectId: "madhut-97c1e",
        appId: "1:443781397252:web:64f178cd71d0993cc0ae51"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    /* ================= DOM ================= */

    const container = document.getElementById("tshirtContainer");
    const paginationDiv = document.getElementById("pagination");
    const cartCount = document.getElementById("cartCount");
    const authSection = document.getElementById("authSection");

    /* ================= STATE ================= */

    let currentPage = 1;
    let totalPages = 1;
    let minPrice = null;
    let maxPrice = null;
    const limit = 15;
    let isLoading = false;

    /* ================= AUTH ================= */

    function updateAuthUI(){
        const token = localStorage.getItem("userToken") || sessionStorage.getItem("userToken");

        if(token){
            authSection.innerHTML = `
                <span class="auth-btn" id="profileBtn">👤 Profile</span>
                <span class="auth-btn" id="logoutBtn">Logout</span>
            `;

            document.getElementById("logoutBtn").addEventListener("click", logout);
            document.getElementById("profileBtn").addEventListener("click", goToProfile);

        }else{
            authSection.innerHTML = `<span class="auth-btn" id="loginBtn">Login</span>`;
            document.getElementById("loginBtn").addEventListener("click", goToLogin);
        }
    }

    function goToLogin(){
        window.location.href = "user_login.html";
    }

    async function logout(){
        try{
            await signOut(auth);
        }catch(e){
            console.log("Firebase logout error:", e);
        }

        localStorage.removeItem("userToken");
        sessionStorage.removeItem("userToken");
        cartCount.textContent = 0;
        window.location.href = "user_login.html";
    }

    /* ================= CART ================= */

    async function fetchCartCount(){
        const token = localStorage.getItem("userToken") || sessionStorage.getItem("userToken");

        if(!token){
            cartCount.textContent = 0;
            return;
        }

        try{
            const res = await fetch("https://madhut-3.onrender.com/fetch/total/item/in/cart",{
                headers:{ "Authorization":"Bearer "+token }
            });

            if(res.status === 401){
                cartCount.textContent = 0;
                return;
            }

            const data = await res.json();
            cartCount.textContent = data.count;

        }catch{
            cartCount.textContent = 0;
        }
    }

    /* ================= PRODUCTS ================= */

    function showSkeleton(){
        container.innerHTML="";
        for(let i=0;i<6;i++){
            container.innerHTML+=`
            <div class="card skeleton-card">
                <div class="skeleton" style="height:280px;"></div>
                <div class="skeleton" style="height:20px;margin-top:15px;"></div>
                <div class="skeleton" style="height:20px;margin-top:10px;width:60%;"></div>
            </div>`;
        }
    }

    function getCacheKey(){
        return `tshirts_page_${currentPage}_${minPrice}_${maxPrice}`;
    }

    async function loadTshirts(){

        if(isLoading) return;
        isLoading = true;

        showSkeleton();

        const cacheKey = getCacheKey();
        const cachedData = sessionStorage.getItem(cacheKey);

        // 🔥 If data already cached → use it instantly
        if(cachedData){
            const data = JSON.parse(cachedData);
            displayProducts(data.products);
            totalPages = data.total_pages;
            setupPagination();
            isLoading = false;
            return;
        }

        let url = `https://madhut-3.onrender.com/user/tshirts?page=${currentPage}&limit=${limit}`;

        if(minPrice!==null && maxPrice!==null){
            url+=`&minPrice=${minPrice}&maxPrice=${maxPrice}`;
        }

        try{
            const res = await fetch(url);
            const data = await res.json();

            // 🔥 Save in cache
            sessionStorage.setItem(cacheKey, JSON.stringify(data));

            displayProducts(data.products);
            totalPages = data.total_pages;
            setupPagination();

            // 🚀 Prefetch next page silently
            if(currentPage < totalPages){
                prefetchNextPage();
            }

        }catch{
            container.innerHTML = "<p>Failed to load products</p>";
        }

        isLoading = false;
    }

    async function prefetchNextPage(){
        const nextPage = currentPage + 1;
        const cacheKey = `tshirts_page_${nextPage}_${minPrice}_${maxPrice}`;

        if(sessionStorage.getItem(cacheKey)) return;

        let url = `https://madhut-3.onrender.com/user/tshirts?page=${nextPage}&limit=${limit}`;

        if(minPrice!==null && maxPrice!==null){
            url+=`&minPrice=${minPrice}&maxPrice=${maxPrice}`;
        }

        try{
            const res = await fetch(url);
            const data = await res.json();
            sessionStorage.setItem(cacheKey, JSON.stringify(data));
        }catch{}
    }

    function displayProducts(products){
        container.innerHTML="";

        if(!products || products.length===0){
            container.innerHTML="<p>No T-Shirts Found</p>";
            return;
        }

        products.forEach(product=>{

            const discount = product.old_price
                ? Math.round(((product.old_price-product.price)/product.old_price)*100)
                : 0;

            const firstImage = product.images?.[0] || "https://via.placeholder.com/300x300?text=No+Image";

            const card = document.createElement("div");
            card.className = "card";

            card.innerHTML = `
                <img src="${firstImage}" loading="lazy">
                <h4>${product.name}</h4>
                <p>
                    <span class="price">₹${product.price}</span>
                    ${product.old_price?`<span class="old-price">₹${product.old_price}</span>`:""}
                    ${discount?`<span class="discount">(${discount}% off)</span>`:""}
                </p>
            `;

            const btn = document.createElement("button");
            btn.className = "add-btn";
            btn.innerText = "View Details";

            btn.addEventListener("click", ()=>{
                window.location.href = `product_detail.html?id=${product._id}`;
            });

            card.appendChild(btn);
            container.appendChild(card);
        });
    }

    function setupPagination(){
        paginationDiv.innerHTML="";

        const maxButtons = 5;
        let start = Math.max(1, currentPage - 2);
        let end = Math.min(totalPages, start + maxButtons - 1);

        for(let i=start;i<=end;i++){
            const btn = document.createElement("button");

            btn.innerText = i;
            if(i === currentPage) btn.classList.add("active");

            btn.addEventListener("click", ()=>{
                currentPage = i;
                window.scrollTo({top:0, behavior:"smooth"});
                loadTshirts();
            });

            paginationDiv.appendChild(btn);
        }
    }

    /* ================= FILTER ================= */

    window.applyFilter = function(min,max){
        minPrice=min;
        maxPrice=max;
        currentPage=1;
        loadTshirts();
    };

    /* ================= INIT ================= */

    window.addEventListener("DOMContentLoaded", async ()=>{
        updateAuthUI();

        await Promise.all([
            fetchCartCount(),
            loadTshirts()
        ]);

        setInterval(fetchCartCount,15000);
    });
    function goToProfile(){
       window.location.href = "user_dashboard.html";
    }

</script>

</body>
</html>
