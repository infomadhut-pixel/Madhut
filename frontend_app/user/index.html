    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}
        html{scroll-behavior:smooth;}
        body{background:#f4f6f9;display:flex;flex-direction:column;min-height:100vh;}
        .main-content{flex:1;}

        /* ✅ FIXED HEADER */
        .header{
            display:flex;justify-content:space-between;align-items:center;
            padding:18px 60px;background:#111;color:white;

            position:fixed;
            top:0;
            left:0;
            width:100%;
            z-index:1000;
        }

        .header nav a{
            color:white;text-decoration:none;margin-left:25px;
            font-size:14px;transition:0.3s;
        }
        .header nav a:hover{color:#0fa36b;}

        .header-right{display:flex;align-items:center;gap:12px;}

        .cart-box{
            background:#222;padding:6px 12px;border-radius:20px;font-size:13px;
        }

        .nav-btn{
            padding:6px 14px;border-radius:20px;font-size:13px;
            cursor:pointer;border:1px solid #444;transition:0.3s;
        }
        .nav-btn:hover{background:#0fa36b;border-color:#0fa36b;}

        /* ✅ PUSH CONTENT DOWN */
        .container{
            padding:120px 60px 40px 60px;
        }

        /* ✅ PREMIUM AD (SCROLLS AWAY) */
        .horizontal-ad{
            width:85%;
            margin:0 auto 30px auto;
            padding:16px;
            border-radius:20px;

            background:linear-gradient(135deg,#0b0b0b,#111,#1c1c1c);
            color:white;
            text-align:center;

            font-size:20px;
            font-weight:700;

            position:relative;
            overflow:hidden;

            box-shadow:0 10px 40px rgba(0,0,0,0.4);
            animation:fadeSlide 1s ease;
        }

        @keyframes fadeSlide{
            from{opacity:0;transform:translateY(-10px);}
            to{opacity:1;transform:translateY(0);}
        }

        .horizontal-ad::after{
            content:"";
            position:absolute;
            top:0;
            left:-100%;
            width:40%;
            height:100%;
            background:linear-gradient(120deg,transparent,rgba(255,255,255,0.3),transparent);
            transform:skewX(-20deg);
            animation:shineMove 3.5s infinite;
        }

        @keyframes shineMove{
            0%{left:-100%;}
            100%{left:200%;}
        }

        .horizontal-ad span{
            display:block;
            margin-top:6px;
            font-size:13px;
            opacity:0.75;
        }

        .highlight{
            color:#d4af37;
        }

        /* PRODUCTS */
        .product-grid{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
            gap:20px;
        }

        .card{
            position:relative;border-radius:16px;overflow:hidden;height:320px;
            cursor:pointer;background:#fff;
            box-shadow:0 6px 18px rgba(0,0,0,0.08);
            transition:0.3s;

            opacity:0;
            transform:translateY(20px);
            animation:fadeIn 0.5s ease forwards;
        }

        @keyframes fadeIn{
            to{opacity:1;transform:translateY(0);}
        }

        .card:hover{transform:translateY(-6px);}

        .card img{width:100%;height:100%;object-fit:contain;background:#fff;}

        .overlay{
            position:absolute;bottom:0;width:100%;height:100%;
            background:linear-gradient(to top, rgba(0,0,0,0.7), transparent 60%);
        }

        .content{
            position:absolute;bottom:0;padding:14px;color:#fff;
        }

        .loader-spinner{
            width:35px;height:35px;border:4px solid #ddd;
            border-top:4px solid #111;border-radius:50%;
            animation:spin 0.8s linear infinite;margin:20px auto;
        }

        @keyframes spin{
            100%{ transform:rotate(360deg); }
        }

        .footer{
            background:#0b0b0b;
            color:white;
            padding:60px 80px 25px;
        }

        /* PERFECT CENTER + NO LEFT GAP */
        .footer-grid{
            max-width:1200px;
            margin:0 auto;   /* 🔥 center everything */
            display:grid;
            grid-template-columns:repeat(4,1fr);
            gap:50px;
        }

        /* HEADINGS */
        .footer-col h3{
            color:#f1c40f;
            margin-bottom:18px;
            font-size:15px;
            letter-spacing:1px;
        }

        .logo{
            color:#f1c40f;
            margin-bottom:18px;
            font-size:22px;
        }

        /* LINKS */
        .footer-link{
            font-size:14px;
            margin-bottom:12px;
            cursor:pointer;
            transition:0.3s;
            color:#ddd;
        }

        .footer-link:hover{
            color:#0fa36b;
            padding-left:5px;
        }

        /* SMALL TEXT */
        .footer-small{
            font-size:13px;
            margin-top:12px;
            opacity:0.7;
        }

        /* SOCIAL */
        .social-row{
            display:flex;
            gap:14px;
            margin-bottom:12px;
        }

        .social{
            width:42px;
            height:42px;
            border-radius:50%;
            display:flex;
            align-items:center;
            justify-content:center;
            background:#1c1c1c;
            text-decoration:none;
            color:white;
            font-size:16px;
            transition:0.3s;
        }

        .youtube:hover{
            background:red;
            box-shadow:0 0 12px red;
            transform:translateY(-4px);
        }

        .facebook:hover{
            background:#1877f2;
            box-shadow:0 0 12px #1877f2;
            transform:translateY(-4px);
        }

        .insta:hover{
            background:linear-gradient(45deg,#feda75,#d62976,#962fbf);
            box-shadow:0 0 12px #d62976;
            transform:translateY(-4px);
        }

        /* SUBSCRIBE */
        .subscribe-box{
            display:flex;
            margin-top:10px;
        }

        .subscribe-box input{
            flex:1;
            padding:12px;
            border:none;
            outline:none;
            background:#1c1c1c;
            color:white;
        }

        .subscribe-box button{
            background:#f1c40f;
            border:none;
            padding:12px 18px;
            cursor:pointer;
            font-weight:bold;
        }

        /* LINE */
        .footer-line{
            margin:40px auto 20px;
            max-width:1200px;
            border:0.5px solid #333;
        }

        /* BOTTOM */
        .footer-bottom{
            text-align:center;
            font-size:13px;
            opacity:0.7;
        }

        /* RESPONSIVE */
        @media(max-width:900px){
            .footer-grid{
                grid-template-columns:1fr 1fr;
            }
        }

        @media(max-width:500px){
            .footer{
                padding:40px 20px;
            }
            .footer-grid{
                grid-template-columns:1fr;
            }
        }
    </style>
</head>

<script type="module">

    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    // ===== CONFIG =====
    const BASE_URL = "https://madhut-7.onrender.com"; // 🔥 CHANGE THIS

    const firebaseConfig = {
        apiKey: "AIzaSyAIqeoNVZaz6XXJRT71ODhreTR-WsmVyXY",
        authDomain: "MADHUT-97c1e.firebaseapp.com",
        projectId: "MADHUT-97c1e",
        appId: "1:443781397252:web:64f178cd71d0993cc0ae51"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // ===== ELEMENTS =====
    const container = document.getElementById("tshirtContainer");
    const cartCount = document.getElementById("cartCount");
    const authSection = document.getElementById("authSection");

    // ===== STATE =====
    let lastId = null;
    let isLoading = false;
    let allLoaded = false;
    let nextBatch = null;

    // ===== SOCKET =====
    const socket = io(BASE_URL, {
        transports: ["websocket"],
        reconnectionAttempts: 2
    });

    socket.on("new_product", addNewProductToTop);
    socket.on("delete_product", (data) => removeProductFromUI(data._id));

    // =====================================
    // 🔥 FETCH WITH TIMEOUT
    // =====================================
    async function fetchWithTimeout(url, options = {}, timeout = 8000) {
        const controller = new AbortController();
        const id = setTimeout(() => controller.abort(), timeout);

        try {
            const res = await fetch(url, { ...options, signal: controller.signal });
            clearTimeout(id);
            return res;
        } catch (err) {
            clearTimeout(id);
            throw err;
        }
    }

    // =====================================
    // AUTH UI
    // =====================================
    onAuthStateChanged(auth, (user) => {

        if (user) {
            authSection.innerHTML = `
                <span class="nav-btn" id="profileBtn">Account</span>
                <span class="nav-btn" id="logoutBtn">Logout</span>
            `;

            document.getElementById("profileBtn").onclick = () => {
                window.location.href = "user_dashboard.html";
            };

            document.getElementById("logoutBtn").onclick = async () => {
                await signOut(auth);
                location.reload();
            };

            fetchCartCount();

        } else {
            authSection.innerHTML = `
                <span class="nav-btn" id="loginBtn">Login</span>
            `;

            document.getElementById("loginBtn").onclick = () => {
                window.location.href = "user_login.html";
            };

            cartCount.textContent = 0;
        }
    });

    // =====================================
    // CART COUNT
    // =====================================
    async function fetchCartCount() {
        const user = auth.currentUser;
        if (!user) return;

        try {
            const token = await user.getIdToken();

            const res = await fetchWithTimeout(`${BASE_URL}/fetch/total/item/in/cart`, {
                headers: { "Authorization": "Bearer " + token }
            });

            const data = await res.json();
            cartCount.textContent = data.count;

        } catch {
            cartCount.textContent = 0;
        }
    }

    // =====================================
    // LOAD PRODUCTS
    // =====================================
    async function loadTshirts() {

        if (isLoading || allLoaded) return;

        isLoading = true;
        showLoader(true);

        try {

            let data;

            // 🔥 LOAD FROM CACHE FIRST (ONLY FIRST LOAD)
            if (!lastId) {
                const cached = localStorage.getItem("products");
                if (cached) {
                    displayProducts(JSON.parse(cached));
                }
            }

            if (nextBatch) {
                data = nextBatch;
                nextBatch = null;
            } else {

                let url = `${BASE_URL}/user/tshirts?limit=30`;

                if (lastId) {
                    url += `&last_id=${lastId}`;
                }

                const res = await fetchWithTimeout(url);
                data = await res.json();
            }

            if (!data.products || data.products.length === 0) {
                allLoaded = true;
                showNoMore();
                return;
            }

            displayProducts(data.products);

            // 🔥 CACHE FIRST LOAD
            if (!lastId) {
                localStorage.setItem("products", JSON.stringify(data.products));
            }

            lastId = data.products[data.products.length - 1]._id;

            if (data.products.length < 30) {
                allLoaded = true;
                showNoMore();
            } else {
                setTimeout(prefetchNext, 100); // 🔥 non-blocking
            }

        } catch (err) {
            console.log(err);
            showError("Failed to load products 😢");
        }

        isLoading = false;
        showLoader(false);
    }

    // =====================================
    // PREFETCH
    // =====================================
    async function prefetchNext() {

        try {
            let url = `${BASE_URL}/user/tshirts?limit=30&last_id=${lastId}`;
            const res = await fetchWithTimeout(url);
            nextBatch = await res.json();
        } catch (err) {
            console.log("Prefetch error", err);
        }
    }
    function displayProducts(products) {
        products.forEach(product => {
            if (document.querySelector(`[data-id="${product._id}"]`)) return;

            const card = createCard(product);
            container.appendChild(card);
        });
    }

    function createCard(product) {

        const card = document.createElement("div");
        card.className = "card";
        card.dataset.id = product._id;

        card.onclick = () => {
            window.location.href = `product_detail.html?id=${product._id}`;
        };

        const imageUrl = product.image || product.images?.[0] || "";

        card.innerHTML = `
            <img src="${imageUrl}?f_auto,q_auto,w=400" loading="lazy" decoding="async">
            <div class="overlay"></div>
            <div class="content">
                <div>${product.name}</div>
                <div style="font-size:14px;">₹${product.price}</div>
            </div>
        `;
        return card;
    }

    function addNewProductToTop(product) {
        if (document.querySelector(`[data-id="${product._id}"]`)) return;

        const card = createCard(product);
        container.prepend(card);
    }

    function removeProductFromUI(productId) {
        const card = document.querySelector(`[data-id="${productId}"]`);
        if (card) card.remove();
    }

    // =====================================
    // LOADER
    // =====================================
    function showLoader(show) {

        let loader = document.getElementById("loader");

        if (!loader) {
            loader = document.createElement("div");
            loader.id = "loader";
            loader.innerHTML = `<div class="loader-spinner"></div>`;
            container.after(loader);
        }

        loader.style.display = show ? "flex" : "none";
    }

    function showNoMore() {

        if (document.getElementById("endMsg")) return;

        const msg = document.createElement("div");
        msg.id = "endMsg";
        msg.style.textAlign = "center";
        msg.style.padding = "20px";
        msg.style.fontWeight = "600";
        msg.innerText = "No more products 🚫";

        container.after(msg);
    }

    function showError(message) {
        const msg = document.createElement("div");
        msg.style.textAlign = "center";
        msg.style.color = "red";
        msg.style.padding = "20px";
        msg.innerText = message;

        container.after(msg);
    }

    // =====================================
    // SCROLL
    // =====================================
    const trigger = document.createElement("div");
    container.after(trigger);

    const observer = new IntersectionObserver((entries) => {
        if (entries[0].isIntersecting) {
            loadTshirts();
        }
    });

    observer.observe(trigger);

    window.onload = () => {
        loadTshirts();
    };

</script>
