<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MadHut | My Orders</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>

<body class="bg-gray-100">

<!-- 🔥 NAVBAR -->
<nav class="bg-white border-b sticky top-0 z-50">
    <div class="max-w-6xl mx-auto px-4 flex justify-between items-center h-16">

        <a href="index.html" class="text-2xl font-bold tracking-tight">
            Mad<span class="text-indigo-600">Hut</span>
        </a>

        <div class="flex items-center gap-6">
            <span id="user-email-display" class="hidden md:block text-sm text-gray-500"></span>

            <a href="https://madhut-2.onrender.com" class="text-gray-600 hover:text-indigo-600">
                <i class="fas fa-shopping-cart text-lg"></i>
            </a>

            <button onclick="logout()"
                    class="text-sm bg-red-500 text-white px-3 py-1 rounded hover:bg-red-600">
                Logout
            </button>
        </div>
    </div>
</nav>

<!-- 🔥 MAIN -->
<main class="max-w-5xl mx-auto px-4 py-8">

    <h1 class="text-3xl font-bold mb-2">Your Orders</h1>
    <p class="text-gray-500 mb-6">Track, manage and review your orders</p>

    <div id="orders-container" class="space-y-6"></div>

</main>


<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAIqeoNVZaz6XXJRT71ODhreTR-WsmVyXY",
        authDomain: "madhut-97c1e.firebaseapp.com",
        projectId: "madhut-97c1e"
    };

    // ✅ Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    const API_URL = 'http://127.0.0.1:5000/user/fetch/order';

    // 🔐 TOKEN
    function getToken() {
        return localStorage.getItem("userToken") || sessionStorage.getItem("userToken");
    }

    // 🔐 REDIRECT LOGIN
    function redirectToLogin() {
        localStorage.removeItem("userToken");
        sessionStorage.removeItem("userToken");
        window.location.href = "user_login.html";
    }

    // 🔥 REAL FIREBASE LOGOUT
    function logout() {
        auth.signOut()
        .then(() => {
            localStorage.removeItem("userToken");
            sessionStorage.removeItem("userToken");
            window.location.href = "user_login.html";
        })
        .catch(err => console.error("Logout error:", err));
    }

    // 🔄 LOADING
    function showLoading() {
        document.getElementById('orders-container').innerHTML = `
            <div class="text-center py-20 text-gray-500">Loading your orders...</div>`;
    }

    // ❌ ERROR
    function showError(msg) {
        document.getElementById('orders-container').innerHTML = `
            <div class="text-center text-red-500 py-10">${msg}</div>`;
    }

    // 🚀 FETCH
    async function fetchAndRenderOrders() {
        const token = getToken();

        if (!token) {
            redirectToLogin();
            return;
        }

        showLoading();

        try {
            const response = await fetch(API_URL, {
                method: "GET",
                headers: {
                    "Authorization": `Bearer ${token}`
                }
            });

            if (response.status === 401) {
                redirectToLogin();
                return;
            }

            const orders = await response.json();

            if (!orders || orders.length === 0) {
                showError("No orders found");
                return;
            }

            renderOrders(orders);

        } catch (err) {
            console.error(err);
            showError("Failed to load orders");
        }
    }

    // 🎨 RENDER
    function renderOrders(orders) {
        const container = document.getElementById('orders-container');
        const emailDisplay = document.getElementById('user-email-display');

        emailDisplay.innerText = orders[0].user_email;

        container.innerHTML = orders.map(order => {
            const date = new Date(order.created_at).toLocaleDateString('en-IN');

            return `
            <div class="bg-white rounded-xl shadow border">

                <div class="p-4 bg-gray-50 flex justify-between flex-wrap gap-4 text-sm">
                    <div>
                        <p class="text-gray-400">Order Date</p>
                        <p class="font-semibold">${date}</p>
                    </div>

                    <div>
                        <p class="text-gray-400">Total</p>
                        <p class="font-bold">₹${order.total_amount}</p>
                    </div>

                    <div>
                        <p class="text-gray-400">Order ID</p>
                        <p class="font-semibold">${order.order_id}</p>
                    </div>

                    <div>
                        <span class="px-2 py-1 text-xs rounded ${
                            order.order_status === "placed"
                            ? "bg-blue-100 text-blue-600"
                            : "bg-green-100 text-green-600"
                        }">
                            ${order.order_status}
                        </span>
                    </div>
                </div>

                <div class="p-4 space-y-4">
                    ${order.items.map(item => `
                        <div class="flex gap-4 border-b pb-4">
                            <img src="${item.image}" class="w-20 h-20 rounded object-cover">

                            <div class="flex-1">
                                <h3 class="font-semibold text-gray-800">${item.name}</h3>
                                <p class="text-sm text-gray-500">Size: ${item.size} | Color: ${item.color}</p>
                                <p class="text-sm text-gray-500">Qty: ${item.quantity}</p>
                                <p class="font-bold">₹${item.price}</p>
                            </div>
                        </div>
                    `).join('')}
                </div>

                <div class="p-4 flex justify-between text-sm text-gray-500">
                    <span>Payment: ${order.payment_status}</span>
                    <span>Mode: ${order.payment_mode}</span>
                </div>

            </div>`;
        }).join('');
    }

    // INIT
    window.addEventListener("load", fetchAndRenderOrders);
</script>

</body>
</html>
