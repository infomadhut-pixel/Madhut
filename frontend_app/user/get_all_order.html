<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MadHut | My Orders</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>

<body class="bg-gray-100">

<!-- NAVBAR -->
<nav class="bg-white border-b sticky top-0 z-50">
    <div class="max-w-6xl mx-auto px-4 flex justify-between items-center h-16">
        <a href="index.html" class="text-2xl font-bold">
            Mad<span class="text-indigo-600">Hut</span>
        </a>

        <div class="flex items-center gap-6">
            <span id="user-email-display" class="hidden md:block text-sm text-gray-500"></span>

            <button onclick="logout()"
                    class="text-sm bg-red-500 text-white px-3 py-1 rounded">
                Logout
            </button>
        </div>
    </div>
</nav>

<!-- MAIN -->
<main class="max-w-5xl mx-auto px-4 py-8">
    <h1 class="text-3xl font-bold mb-2">Your Orders</h1>
    <div id="orders-container" class="space-y-6"></div>
</main>

<!-- ⭐ REVIEW MODAL -->
<div id="reviewModal" class="fixed inset-0 bg-black bg-opacity-50 hidden justify-center items-center">
    <div class="bg-white p-6 rounded-lg w-80">

        <h2 class="text-lg font-bold mb-3">Write Review</h2>

        <input type="hidden" id="productId">
        <input type="hidden" id="orderId">

        <label class="text-sm">Rating</label>
        <select id="rating" class="w-full border p-2 mb-3">
            <option value="5">⭐⭐⭐⭐⭐</option>
            <option value="4">⭐⭐⭐⭐</option>
            <option value="3">⭐⭐⭐</option>
            <option value="2">⭐⭐</option>
            <option value="1">⭐</option>
        </select>

        <label class="text-sm">Comment</label>
        <textarea id="comment" class="w-full border p-2 mb-3"></textarea>

        <div class="flex justify-between">
            <button onclick="closeReview()" class="text-gray-500">Cancel</button>
            <button onclick="submitReview()" class="bg-indigo-600 text-white px-3 py-1 rounded">Submit</button>
        </div>

    </div>
</div>

<script>
    const API_URL = 'https://madhut-2.onrender.com/user/fetch/order';

    function getToken() {
        return localStorage.getItem("userToken") || sessionStorage.getItem("userToken");
    }

    function logout() {
        localStorage.clear();
        sessionStorage.clear();
        window.location.href = "user_login.html";
    }

    function showLoading() {
        document.getElementById('orders-container').innerHTML =
            `<div class="text-center py-20">Loading...</div>`;
    }

    function showError(msg) {
        document.getElementById('orders-container').innerHTML =
            `<div class="text-center text-red-500 py-10">${msg}</div>`;
    }

    async function fetchAndRenderOrders() {
        const token = getToken();
        if (!token) return window.location.href = "user_login.html";

        showLoading();

        try {
            const res = await fetch(API_URL, {
                headers: { "Authorization": `Bearer ${token}` }
            });

            const orders = await res.json();
            if (!orders.length) return showError("No orders found");

            renderOrders(orders);

        } catch {
            showError("Error loading orders");
        }
    }

    function renderOrders(orders) {
        const container = document.getElementById('orders-container');

        container.innerHTML = orders.map(order => `
            <div class="bg-white rounded-xl shadow border">

                <div class="p-4 bg-gray-50 flex justify-between text-sm">
                    <div>${new Date(order.created_at).toLocaleDateString()}</div>
                    <div class="font-bold">₹${order.total_amount}</div>
                    <div>${order.order_status}</div>
                </div>

                <div class="p-4 space-y-4">
                    ${order.items.map(item => `
                        <div class="flex gap-4 border-b pb-4">

                            <img src="${item.image}" class="w-20 h-20 rounded">

                            <div class="flex-1">
                                <h3 class="font-semibold">${item.name}</h3>
                                <p class="text-sm">Qty: ${item.quantity}</p>
                                <p class="font-bold">₹${item.price}</p>

                                ${order.order_status === "pending" ? `
                                    <button onclick="openReview('${item.product_id}', '${order.order_id}')"
                                        class="mt-2 px-3 py-1 bg-indigo-600 text-white text-xs rounded">
                                        Write Review
                                    </button>
                                ` : ""}
                            </div>

                        </div>
                    `).join('')}
                </div>
            </div>
        `).join('');
    }

    function openReview(productId, orderId) {
        document.getElementById("reviewModal").classList.remove("hidden");
        document.getElementById("productId").value = productId;
        document.getElementById("orderId").value = orderId;
    }

    function closeReview() {
        document.getElementById("reviewModal").classList.add("hidden");
    }

    async function submitReview() {
        const token = getToken();

        const data = {
            product_id: document.getElementById("productId").value,
            order_id: document.getElementById("orderId").value,
            rating: document.getElementById("rating").value,
            comment: document.getElementById("comment").value
        };

        try {
            const res = await fetch("https://madhut-2.onrender.com/user/review/add", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${token}`
                },
                body: JSON.stringify(data)
            });

            const result = await res.json();

            if (res.ok) {
                alert("Review submitted ");
                closeReview();
            } else {
                alert(result.message);
            }

        } catch {
            alert("Error submitting review");
        }
    }

    window.onload = fetchAndRenderOrders;
</script>
</body>
</html>
