<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MADHUT | My Orders</title>
    <link rel="icon" type="image/x-icon" href="static/images/mad_hut.jpeg">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAIqeoNVZaz6XXJRT71ODhreTR-WsmVyXY",
            authDomain: "MADHUT-97c1e.firebaseapp.com",
            projectId: "MADHUT-97c1e",
            appId: "1:443781397252:web:64f178cd71d0993cc0ae51"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        window.auth = auth;
        window.signOutUser = signOut;

        onAuthStateChanged(auth, (user) => {
            if (!user) {
                window.location.href = "user_login.html";
            } else {
                fetchAndRenderOrders(); // only after login confirmed
            }
        });
    </script>

</head>

<body class="bg-gray-100">

<nav class="bg-black sticky top-0 z-50 shadow-sm">
    <div class="w-full px-4 flex justify-between items-center h-16">

        <a href="user_dashboard.html" class="text-2xl font-bold">
            <span class="text-yellow-400">Mad</span><span class="text-yellow-400">Hut</span>
        </a>

        <button onclick="logout()"
                class="text-sm bg-red-500 text-white px-4 py-1.5 rounded-lg shadow hover:bg-red-600 transition">
            Logout
        </button>

    </div>
</nav>

<main class="max-w-5xl mx-auto px-4 py-8">
    <h1 class="text-3xl font-bold mb-6">Your Orders</h1>
    <div id="orders-container" class="space-y-6"></div>
</main>

<script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
<script>
    const socket = io("https://madhut-qeqj.onrender.com");

    const API_URL = 'https://madhut-qeqj.onrender.com/user/fetch/order';

    async function logout() {
        await window.signOutUser(window.auth);
        window.location.href = "user_login.html";
    }

    function showLoading() {
        document.getElementById('orders-container').innerHTML =
            `<div class="text-center py-20 text-gray-500">Loading...</div>`;
    }

    function showError(msg) {
        document.getElementById('orders-container').innerHTML =
            `<div class="text-center text-red-500 py-10">${msg}</div>`;
    }

    async function fetchAndRenderOrders(isRealtime = false) {

        const user = window.auth.currentUser;
        if (!user) return;

        const idToken = await user.getIdToken();

        if (!isRealtime) {
            showLoading();
        }

        try {
            const res = await fetch(API_URL, {
                headers: { "Authorization": `Bearer ${idToken}` }
            });

            const orders = await res.json();
            if (!orders.length) return showError("No orders found");

            renderOrders(orders);

        } catch {
            showError("Error loading orders");
        }
    }

    function renderOrders(orders) {
        const container = document.getElementById('orders-container');

        container.innerHTML = orders.map(order => `
            <div class="bg-white rounded-2xl shadow-md hover:shadow-lg transition overflow-hidden border">

                <div class="p-4 bg-gray-50 flex justify-between items-center text-sm border-b">
                    <div class="text-gray-500">${new Date(order.created_at).toLocaleDateString()}</div>
                    <div class="font-bold text-lg">₹${order.total_amount}</div>
                    <div class="capitalize px-3 py-1 rounded-full text-xs font-semibold
                        ${getStatusColor(order.order_status)}">
                        ${order.order_status}
                    </div>
                </div>

                <div class="p-5 space-y-5">

                    ${
                        order.tracking_id
                        ? `
                        <div class="flex items-center justify-between bg-gradient-to-r from-blue-50 to-indigo-50 border border-blue-200 px-4 py-3 rounded-xl shadow-sm">

                            <div class="flex items-center gap-3">
                                <i class="fa-solid fa-truck text-blue-600"></i>
                                <div>
                                    <div class="text-xs text-gray-500">Tracking ID</div>
                                    <div class="font-semibold text-blue-700">${order.tracking_id}</div>
                                </div>
                            </div>

                            <button onclick="copyTracking('${order.tracking_id}')"
                                class="text-xs bg-blue-600 text-white px-3 py-1 rounded-lg hover:bg-blue-700 transition">
                                Copy
                            </button>
                        </div>
                        `
                        : ""
                    }

                    ${order.items.map(item => `
                        <div class="flex gap-4 border-b pb-4">

                            <img src="${item.image}" class="w-20 h-20 rounded-lg object-cover shadow-sm">

                            <div class="flex-1">
                                <h3 class="font-semibold text-gray-800">${item.name}</h3>
                                <p class="text-sm text-gray-500">Qty: ${item.quantity}</p>
                                <p class="font-bold text-gray-900">₹${item.price}</p>

                                ${
                                    order.order_status === "delivered"
                                    ? (
                                        order.is_reviewed
                                        ? `
                                        <span class="mt-2 inline-block px-3 py-1 text-xs rounded-full bg-green-500 text-white">
                                            Reviewed
                                        </span>
                                        `
                                        : `
                                        <button
                                            onclick="openReview('${item.product_id}', '${order.order_id}', this)"
                                            class="mt-2 inline-flex items-center gap-1 px-3 py-1.5 text-xs font-medium
                                            bg-indigo-600 text-white rounded-full shadow hover:bg-indigo-700 transition">
                                            Write Review
                                        </button>
                                        `
                                    )
                                    : `
                                    <span class="mt-2 inline-block px-3 py-1 text-xs rounded-full bg-gray-200 text-gray-500">
                                        Review after delivery
                                    </span>
                                    `
                                }

                            </div>
                        </div>
                    `).join('')}

                </div>
            </div>
        `).join('');
    }

    function getStatusColor(status){
        status = status.toLowerCase();

        if(status === "pending") return "bg-red-100 text-red-600";
        if(status === "processing") return "bg-yellow-100 text-yellow-600";
        if(status === "dispatch") return "bg-blue-100 text-blue-600";
        if(status === "delivered") return "bg-green-100 text-green-600";
        return "bg-gray-100 text-gray-600";
    }

    function copyTracking(id){
        navigator.clipboard.writeText(id);
        alert("Tracking ID Copied");
    }

    socket.on("order_updated", () => {
        fetchAndRenderOrders(true);
    });

</script>

</body>
</html>
