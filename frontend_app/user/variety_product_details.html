<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MadHut | Products</title>
    <link rel="icon" type="image/x-icon" href="static/images/mad_hut.jpeg">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Segoe UI',sans-serif;
        }

        body{
            background:#e5e7eb;
        }

        /* HEADER */
        .header{
            padding:18px 60px;
            background:#000;
        }

        .logo{
            color:#f1c40f;
            font-size:22px;
            font-weight:700;
            text-decoration:none;
        }

        /* GRID */
        .products{
            display:grid;
            grid-template-columns:repeat(3,1fr);
            gap:30px;
            padding:40px 60px;
        }

        /* CARD */
        .card{
            position:relative;
            height:240px;
            border-radius:20px;
            overflow:hidden;
            background:#f5f5f5;
            cursor:pointer;
            transition:0.3s;
        }

        .card:hover{
            transform:translateY(-6px);
            box-shadow:0 12px 30px rgba(0,0,0,0.15);
        }

        /* IMAGE */
        .img-box{
            position:absolute;
            inset:0;
            display:flex;
            align-items:center;
            justify-content:center;
        }

        .img-box img{
            max-width:100%;
            max-height:100%;
            object-fit:contain;
        }

        /* OVERLAY */
        .overlay{
            position:absolute;
            bottom:0;
            width:100%;
            height:60%;
            background:linear-gradient(to top,rgba(0,0,0,0.85),transparent);
        }

        /* TEXT */
        .content{
            position:absolute;
            bottom:15px;
            left:15px;
            color:white;
        }

        .name{
            font-size:13px;
            margin-bottom:6px;
        }

        /* PRICE */
        .price{
            display:flex;
            gap:8px;
        }

        .discount{
            background:#00a86b;
            padding:3px 8px;
            border-radius:12px;
            font-size:11px;
        }

        /* LOADER */
        .card-loading{
            position:absolute;
            inset:0;
            background:rgba(0,0,0,0.6);
            display:flex;
            align-items:center;
            justify-content:center;
            display:none;
        }

        .spinner{
            width:30px;
            height:30px;
            border:3px solid #fff;
            border-top:3px solid transparent;
            border-radius:50%;
            animation:spin 1s linear infinite;
        }

        @keyframes spin{
            to{ transform:rotate(360deg); }
        }

        .loader{
            text-align:center;
            margin-top:50px;
        }
    </style>
</head>

<body>

<div class="header">
    <a href="variety.html" class="logo">MADHUT</a>
</div>

<div class="products" id="products"></div>
<div class="loader" id="loader">Loading products...</div>

<script>
    let data = JSON.parse(sessionStorage.getItem("products"));
    const container = document.getElementById("products");
    const loader = document.getElementById("loader");

    /* 🔥 FIX: RESET UI WHEN BACK */
    window.addEventListener("pageshow", () => {
        document.querySelectorAll(".card-loading").forEach(el => {
            el.style.display = "none";
        });

        document.querySelectorAll(".card").forEach(card => {
            card.style.pointerEvents = "auto";
        });
    });

    /* LOAD DATA */
    if(Array.isArray(data) && data.length > 0){
        loader.style.display = "none";
        render();
    }else{
        const type = new URLSearchParams(window.location.search).get("type");

        fetch(`https://madhut-qeqj.onrender.com/tshirt/variety?type=${type}`)
        .then(res => res.json())
        .then(resData => {
            data = resData;
            sessionStorage.setItem("products", JSON.stringify(data));
            render();
        })
        .catch(()=>{
            loader.innerText = "Failed to load data";
        });
    }

    /* RENDER */
    function render(){
        loader.style.display = "none";

        container.innerHTML = data.map(p => `
            <div class="card" onclick="goDetail(event, '${p._id}')">

                <div class="img-box">
                    <img src="${p.images[0]}">
                </div>

                <div class="overlay"></div>

                <div class="content">
                    <div class="name">${p.name}</div>

                    <div class="price">
                        <div>₹${p.price}</div>
                        <div class="discount">${p.discount_percent}% OFF</div>
                    </div>
                </div>

                <div class="card-loading">
                    <div class="spinner"></div>
                </div>

            </div>
        `).join("");
    }

    /* CLICK */
    function goDetail(event, id){
        const card = event.currentTarget;

        const loader = card.querySelector(".card-loading");
        loader.style.display = "flex";

        card.style.pointerEvents = "none";

        setTimeout(()=>{
            window.location.href = `product_detail.html?id=${id}`;
        }, 400);
    }
</script>

</body>
</html>
