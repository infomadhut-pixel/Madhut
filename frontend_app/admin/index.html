<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, sans-serif;
        }

        body{
            background:#f4f6f9;
        }

        /* Header */
        .header{
            background:#2c3e50;
            color:white;
            padding:15px 30px;
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        .profile{
            display:flex;
            align-items:center;
            gap:10px;
        }

        .profile img{
            width:40px;
            height:40px;
            border-radius:50%;
        }

        .logout-btn{
            background:#e74c3c;
            border:none;
            padding:8px 15px;
            color:white;
            cursor:pointer;
            border-radius:4px;
        }

        /* Main Content */
        .container{
            padding:30px;
        }

        .grid{
            display:grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap:20px;
        }

        .card{
            background:white;
            padding:30px;
            text-align:center;
            border-radius:6px;
            box-shadow:0 2px 5px rgba(0,0,0,0.1);
            cursor:pointer;
            transition:0.2s;
        }

        .card:hover{
            background:#ecf0f1;
        }

        /* Dummy Page */
        .dummy-page{
            display:none;
            margin-top:20px;
            background:white;
            padding:30px;
            border-radius:6px;
            box-shadow:0 2px 5px rgba(0,0,0,0.1);
        }

        .back-btn{
            margin-top:15px;
            padding:6px 12px;
            border:none;
            background:#2c3e50;
            color:white;
            cursor:pointer;
            border-radius:4px;
        }

        /* Responsive */
        @media(max-width:600px){
            .header{
                flex-direction:column;
                gap:10px;
            }
        }
    </style>
</head>

<body>

<!-- Header -->
<div class="header">
    <div class="profile">
        <h3>Admin</h3>
    </div>
    <button class="logout-btn" onclick="logout()">Logout</button>
</div>

<!-- Main -->
<div class="container">

    <div class="grid">

        <div class="card" onclick="goPage('manage_product.html')">Manage Products</div>

        <div class="card" onclick="goPage('admin_get_all_order.html')">Orders</div>

        <div class="card" onclick="goPage('users.html')">Users</div>

        <div class="card" onclick="goPage('analytics.html')">Analytics</div>

        <div class="card" onclick="goPage('settings.html')">Settings</div>

    </div>


</div>

<script>
    function logout(){
        localStorage.removeItem("userToken");
        sessionStorage.removeItem("userToken");
        alert("Logged out");
        window.location.href="admin_login.html";
    }

    function goPage(page){
        window.location.href = page;
    }

</script>

</body>
</html>
