<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Admin | Products</title>

    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Segoe UI',sans-serif;
        }

        body{
            background:#f3f4f6;
            padding:25px;
        }

        .header{
            margin-bottom:25px;
        }

        .header h1{
            font-size:22px;
            font-weight:600;
        }

        #loader{
            text-align:center;
            margin-top:120px;
            font-size:18px;
            font-weight:500;
        }

        .grid{
            display:none;
            grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
            gap:20px;
        }

        .card{
            position:relative;
            border-radius:18px;
            overflow:hidden;
            cursor:pointer;
            height:340px;
            background:#000;
        }

        .card img{
            width:100%;
            height:100%;
            object-fit:contain;
            transition:0.2s;
            background:#fff;
        }

        .card:hover img{
            transform:scale(1.08);
        }

        .overlay{
            position:absolute;
            bottom:0;
            left:0;
            width:100%;
            height:100%;
            background:linear-gradient(to top, rgba(0,0,0,0.85), transparent 60%);
        }

        .content{
            position:absolute;
            bottom:0;
            padding:16px;
            color:#fff;
            width:100%;
        }

        .title{
            font-size:14px;
            margin-bottom:6px;
            line-height:1.4;
            display:-webkit-box;
            -webkit-line-clamp:2;
            -webkit-box-orient:vertical;
            overflow:hidden;
        }

        .price{
            font-size:16px;
            font-weight:700;
        }

        .old-price{
            font-size:12px;
            text-decoration:line-through;
            color:#bbb;
            margin-left:6px;
        }

        .pagination{
            display:none;
            margin-top:30px;
            justify-content:center;
            gap:8px;
        }

        .page-btn{
            padding:8px 14px;
            border:none;
            border-radius:8px;
            background:#ddd;
            cursor:pointer;
        }

        .active{
            background:#000;
            color:#fff;
        }

        .back-btn{
            background: transparent;
            border: none;
            color: black;
            font-size:22px;
            font-weight:600;
            cursor: pointer;
            padding: 6px 10px;
        }

        .back-btn:hover{
            opacity: 0.7;
        }
    </style>
</head>

<body>

<div class="header" style="display:flex;align-items:center;gap:15px;">
    <button onclick="goBack()" class="back-btn">Back</button>
    <h1>All Products</h1>
</div>

<div id="loader">Loading products...</div>

<div class="grid" id="productGrid"></div>

<div class="pagination" id="pagination"></div>

<script>
    const socket = io("https://madhut-2-62yx.onrender.com");

    let currentPage = 1;
    const limit = 20;

    const params = new URLSearchParams(window.location.search);
    const deletedId = params.get("deleted");

    if(deletedId){
        console.log("Deleted from detail page:", deletedId);

        setTimeout(() => {
            const card = document.querySelector(`[data-id="${deletedId}"]`);
            if(card){
                card.remove();
            }
        }, 500);
    }

    async function loadProducts(page = 1){

        document.getElementById("loader").style.display = "block";
        document.getElementById("productGrid").style.display = "none";
        document.getElementById("pagination").style.display = "none";

        try{
            const res = await fetch(`https://madhut-2-62yx.onrender.com/admin/view/all/product?page=${page}&limit=${limit}&t=${Date.now()}`,{
                method:"POST",
                headers: {
                    "Cache-Control": "no-cache"
                }
            });

            const data = await res.json();

            renderProducts(data.products);
            renderPagination(data.total_pages, page);

        }catch(err){
            console.error(err);
            document.getElementById("loader").innerText = "Failed to load products";
        }

        document.getElementById("loader").style.display = "none";
        document.getElementById("productGrid").style.display = "grid";
        document.getElementById("pagination").style.display = "flex";
    }

    function renderProducts(products){
        const grid = document.getElementById("productGrid");

        grid.innerHTML = products.map(p => `
            <div class="card" data-id="${p._id}" onclick="openProduct('${p._id}')">

                <img src="${p.images ? p.images[0] : p.image}" alt="">

                <div class="overlay"></div>

                <div class="content">
                    <div class="title">${p.name}</div>
                    <div class="price">
                        ₹${p.price}
                        <span class="old-price">₹${p.old_price}</span>
                    </div>
                </div>

            </div>
        `).join("");
    }

    function openProduct(id){
        window.location.href = `admin_product_detail.html?id=${id}`;
    }

    function renderPagination(totalPages,current){
        const container = document.getElementById("pagination");
        let buttons = "";
        for(let i=1;i<=totalPages;i++){
            buttons += `
            <button class="page-btn ${i===current?'active':''}" onclick="changePage(${i})">${i}</button>
            `;
        }
        container.innerHTML = buttons;
    }

    function changePage(page){
        currentPage = page;
        loadProducts(page);
    }

    function goBack(){
       window.location.href = "admin_index.html";
    }

    // 🔥 REAL-TIME DELETE
    socket.on("delete_product", function(data){
        const card = document.querySelector(`[data-id="${data.product_id}"]`);
        if(card){
            card.remove();
        }
    });

    // 🔥🔥 NEW FEATURE (REAL-TIME ADD PRODUCT)
    socket.on("new_product", function(product){
        console.log("New product received:", product);

        const grid = document.getElementById("productGrid");

        const newCard = document.createElement("div");
        newCard.className = "card";
        newCard.setAttribute("data-id", product._id);
        newCard.onclick = () => openProduct(product._id);

        newCard.innerHTML = `
            <img src="${product.image}" alt="">

            <div class="overlay"></div>

            <div class="content">
                <div class="title">${product.name}</div>
                <div class="price">
                    ₹${product.price}
                    <span class="old-price">₹${product.old_price}</span>
                </div>
            </div>
        `;

        // add new product on top
        grid.prepend(newCard);
    });

    loadProducts();
</script>

</body>
</html>
